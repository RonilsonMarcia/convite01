<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Ronilson & Márcia</title>

<link href="https://fonts.googleapis.com/css2?family=Alex+Brush&family=Cinzel:wght@400;700&family=Montserrat:wght@300;400;600&display=swap" rel="stylesheet">

<style>
:root{
  --gold:#c9a24a;
  --gold-dark:#8a6424;
  --dark:#3f4d63;
  --blue:#4f5f78;
}

*{margin:0;padding:0;box-sizing:border-box}

html{
  scroll-behavior:smooth;
  scroll-snap-type:y mandatory;
}

body{
  font-family:'Montserrat',sans-serif;
  color:var(--dark);
  background:#fffaf2;
}

/* FUNDO */
body::before{
  content:"";
  position:fixed;
  inset:0;
  background:url("fundo-flores.png") center/cover no-repeat;
  opacity:.9;
  z-index:-2;
}

body::after{
  content:"";
  position:fixed;
  inset:0;
  background:rgba(255,250,242,.8);
  z-index:-1;
}

/* BOTÃO MÚSICA */
.audio-btn{
  position:fixed;
  right:15px;
  bottom:15px;
  z-index:999;
  width:50px;
  height:50px;
  border-radius:50%;
  border:none;
  background:linear-gradient(135deg,#4f5f78,#3f4d63);
  color:#fff;
  font-size:18px;
}

/* ENVELOPE */
#tela-envelope{
  height:100vh;
  display:flex;
  align-items:center;
  justify-content:center;
}

.convite{
  width:360px;
  background:#fff;
  border-radius:25px;
  overflow:hidden;
  text-align:center;
  box-shadow:0 20px 60px rgba(0,0,0,.25);
}

.topo{
  padding:25px;
}

.selo-img{
  width:140px;
  margin-bottom:10px;
}

.envelope{
  height:220px;
  background:linear-gradient(135deg,#4f5f78,#3f4d63);
  position:relative;
  cursor:pointer;
}

.tampa{
  position:absolute;
  inset:0;
  background:#2c3b52;
  clip-path:polygon(0 0,100% 0,50% 100%);
  transition:1s;
}

.envelope.aberto .tampa{
  transform:rotateX(180deg);
}

.texto-envelope{
  position:absolute;
  bottom:20px;
  width:100%;
  color:#fff;
}

/* PÁGINAS */
#site{display:none}

.pagina{
  min-height:100vh;
  display:flex;
  align-items:center;
  justify-content:center;
  padding:20px;
  text-align:center;
}

.box{
  background:#fff;
  padding:30px;
  border-radius:25px;
  box-shadow:0 15px 45px rgba(0,0,0,.1);
  max-width:900px;
  width:100%;
}

/* NOMES (AJUSTADO DEFINITIVO) */
.nomes{
  font-family:'Alex Brush',cursive;
  font-size:clamp(32px,8vw,105px);
  background:linear-gradient(45deg,#8a6424,#c9a24a,#f4d27a);
  -webkit-background-clip:text;
  -webkit-text-fill-color:transparent;
  white-space:nowrap;
  letter-spacing:-1px;
}

/* DATA */
.dia{
  font-size:100px;
  font-weight:bold;
}

.texto{
  margin-top:15px;
  line-height:1.7;
}

/* FOTO */
.foto{
  width:100%;
  height:300px;
  object-fit:cover;
  border-radius:20px;
  opacity:.85;
}

/* BOTÃO */
.btn{
  display:inline-block;
  margin-top:15px;
  padding:12px 20px;
  background:#3f4d63;
  color:#fff;
  border-radius:20px;
  text-decoration:none;
}

/* RESPONSIVO */
@media(max-width:768px){
  .nomes{font-size:clamp(32px,10vw,60px)}
}

@media(max-width:420px){
  .nomes{font-size:30px}
}

</style>
</head>

<body>

<audio id="musica" loop>
  <source src="musica.mp3">
</audio>

<button class="audio-btn" onclick="toggleMusica()">♪</button>

<!-- ENVELOPE -->
<div id="tela-envelope">
  <div class="convite">
    <div class="topo">
      <img src="rm1.png" class="selo-img">
      <p>CONVITE DE CASAMENTO</p>
    </div>

    <div class="envelope" onclick="abrir()" id="env">
      <div class="tampa"></div>
      <div class="texto-envelope">TOQUE PARA ABRIR</div>
    </div>
  </div>
</div>

<!-- SITE -->
<div id="site">

<section class="pagina">
  <div class="box">
    <h2>SAVE THE DATE</h2>

    <h1 class="nomes">Ronilson & Márcia</h1>

    <div class="dia">30</div>
    <p>Outubro 2026</p>

    <a href="#convite" class="btn">Ver Convite</a>
  </div>
</section>

<section class="pagina">
  <div class="box">
    <img src="fotoigreja.jpeg" class="foto">

    <h2 class="nomes">Ronilson & Márcia</h2>

    <p class="texto">
      Queridos familiares e amigos,<br><br>
      Este dia só fará sentido com vocês.
    </p>
  </div>
</section>

<section class="pagina" id="convite">
  <div class="box">

    <h1 class="nomes">Ronilson & Márcia</h1>

    <p class="texto">
      Capela Nossa Senhora do Perpétuo Socorro<br>
      Manaus - AM
    </p>

  </div>
</section>

</div>

<script>
function abrir(){
  document.getElementById("env").classList.add("aberto");

  setTimeout(()=>{
    document.getElementById("tela-envelope").style.display="none";
    document.getElementById("site").style.display="block";

    document.getElementById("musica").play().catch(()=>{});
  },800);
}

function toggleMusica(){
  const a=document.getElementById("musica");
  if(a.paused){a.play()}else{a.pause()}
}
</script>

</body>
</html>
